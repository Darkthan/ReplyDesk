version: '3.8'

networks:
  backend:
    internal: true

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: emailauto
      POSTGRES_USER: emailauto
      POSTGRES_PASSWORD: devpassword
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - backend
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailauto"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
