version: '3.8'

networks:
  backend:
    internal: true
  frontend:

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: emailauto
      POSTGRES_USER: emailauto
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/db/migrations:/docker-entrypoint-initdb.d
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emailauto"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: emailauto
      DB_USER: emailauto
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      POLLING_INTERVAL_MS: ${POLLING_INTERVAL_MS:-60000}
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - backend
      - frontend
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - frontend
    depends_on:
      - server

volumes:
  pgdata:
